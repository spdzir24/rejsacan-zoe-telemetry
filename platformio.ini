; PlatformIO Project Configuration for RejsaCAN v6.x with ESP32-C6
; Renault Zoe ZE50 Phase 2 CAN Telemetry System
; Author: Generated for automotive embedded systems development
; Date: 2026-03-06

[env:esp32-c6-devkitc-1]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino

; ESP32-C6 specific configuration
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Monitor configuration for UART telemetry output
monitor_speed = 115200
monitor_filters = direct
upload_speed = 921600

; Build flags for ESP32-C6 TWAI and optimization
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Configuration flags
    -DENABLE_PASSIVE_SNIFFING=1
    -DENABLE_UDS_DIAGNOSTICS=0  ; Default: UDS disabled for safety
    -DCAN_BITRATE=500000
    -DUART_BAUDRATE=115200
    -DTELEMETRY_FORMAT_JSON=1
    -DENABLE_DEBUG_OUTPUT=1
    ; ESP32-C6 TWAI specific
    -DTWAI_TX_GPIO=GPIO_NUM_5
    -DTWAI_RX_GPIO=GPIO_NUM_4
    ; Timing configuration
    -DUDS_POLL_INTERVAL_FAST_MS=1000
    -DUDS_POLL_INTERVAL_MEDIUM_MS=5000
    -DUDS_POLL_INTERVAL_SLOW_MS=30000
    -DUDS_TIMEOUT_MS=200
    -DUDS_MAX_RETRIES=2
    ; Buffer sizes
    -DCAN_RX_QUEUE_SIZE=50
    -DTELEMETRY_BUFFER_SIZE=512
    ; Feature flags
    -DENABLE_HEARTBEAT=1
    -DHEARTBEAT_INTERVAL_MS=5000

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.0.4

; Additional build settings
build_unflags = 
    -std=gnu++11

build_type = release

; Debugging configuration (optional)
[env:esp32-c6-devkitc-1-debug]
extends = env:esp32-c6-devkitc-1
build_type = debug
build_flags = 
    ${env:esp32-c6-devkitc-1.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DENABLE_DEBUG_OUTPUT=2
    -Og
    -ggdb

; Production configuration with UDS enabled
[env:esp32-c6-devkitc-1-uds]
extends = env:esp32-c6-devkitc-1
build_flags = 
    ${env:esp32-c6-devkitc-1.build_flags}
    -DENABLE_UDS_DIAGNOSTICS=1
    -DCORE_DEBUG_LEVEL=2
    -DENABLE_DEBUG_OUTPUT=0
